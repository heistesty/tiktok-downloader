<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok HD Downloader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0f0f10;
    --card: #1a1a1c;
    --accent: #fe2c55;
    --accent2: #25f4ee;
    --text: #f2f2f2;
    --muted: #9a9a9a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 48px 16px;
    min-height: 100vh;
  }
  .container {
    width: 100%;
    max-width: 480px;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p.subtitle {
    color: var(--muted);
    margin-top: 0;
    margin-bottom: 28px;
    font-size: 0.9rem;
  }
  .input-row {
    display: flex;
    gap: 8px;
  }
  input[type="text"] {
    flex: 1;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid #333;
    background: var(--card);
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
  }
  input[type="text"]:focus {
    border-color: var(--accent2);
  }
  button {
    padding: 14px 20px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .card {
    margin-top: 24px;
    background: var(--card);
    border-radius: 14px;
    padding: 18px;
    display: none;
  }
  .card.visible { display: block; }
  .card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 12px;
  }
  .card h3 {
    margin: 0 0 4px 0;
    font-size: 1rem;
  }
  .card .meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 14px;
  }
  .download-btn {
    display: inline-block;
    width: 100%;
    text-align: center;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    text-decoration: none;
    color: #111;
    font-weight: 700;
    padding: 14px;
    border-radius: 10px;
  }
  .status {
    margin-top: 16px;
    font-size: 0.9rem;
    color: var(--muted);
  }
  .status.error { color: var(--accent); }
</style>
</head>
<body>
  <div class="container">
    <h1>TikTok HD Downloader</h1>
    <p class="subtitle">Paste a TikTok link to download the video, no watermark.</p>

    <div class="input-row">
      <input type="text" id="urlInput" placeholder="Paste TikTok link here...">
      <button id="goBtn">Fetch</button>
    </div>

    <div class="status" id="status"></div>

    <div class="card" id="resultCard">
      <img id="thumb" src="" alt="thumbnail">
      <h3 id="title"></h3>
      <div class="meta" id="meta"></div>
      <button id="downloadBtn" class="download-btn" style="width:100%; border:none;">Download HD Video</button>
    </div>
  </div>

<script>
const urlInput = document.getElementById('urlInput');
const goBtn = document.getElementById('goBtn');
const statusEl = document.getElementById('status');
const resultCard = document.getElementById('resultCard');
const thumb = document.getElementById('thumb');
const titleEl = document.getElementById('title');
const metaEl = document.getElementById('meta');
const downloadBtn = document.getElementById('downloadBtn');

let currentUrl = '';

// Auto-fetch info when a link is pasted
urlInput.addEventListener('paste', () => {
  setTimeout(() => { if (urlInput.value.trim()) fetchInfo(); }, 100);
});

goBtn.addEventListener('click', fetchInfo);

async function fetchInfo() {
  const url = urlInput.value.trim();
  if (!url) return;
  currentUrl = url;
  resultCard.classList.remove('visible');
  setStatus('Fetching video info...');
  goBtn.disabled = true;

  try {
    const res = await fetch('/api/info', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to fetch info');

    thumb.src = data.thumbnail || '';
    titleEl.textContent = data.title || 'TikTok video';
    metaEl.textContent = data.uploader ? `by @${data.uploader}` : '';
    resultCard.classList.add('visible');
    setStatus('');
  } catch (err) {
    setStatus(err.message, true);
  } finally {
    goBtn.disabled = false;
  }
}

downloadBtn.addEventListener('click', async () => {
  if (!currentUrl) return;
  downloadBtn.textContent = 'Preparing download...';
  downloadBtn.disabled = true;
  setStatus('Downloading HD version, this may take a few seconds...');

  try {
    const res = await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: currentUrl })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Download failed');

    window.location.href = data.download_url;
    setStatus('Download ready!');
  } catch (err) {
    setStatus(err.message, true);
  } finally {
    downloadBtn.textContent = 'Download HD Video';
    downloadBtn.disabled = false;
  }
});

function setStatus(msg, isError = false) {
  statusEl.textContent = msg;
  statusEl.className = 'status' + (isError ? ' error' : '');
}
</script>
</body>
</html>
